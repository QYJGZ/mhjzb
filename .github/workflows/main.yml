name: Build Windows MSIX

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build MSIX
        run: dart run msix:create

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mhjzb-windows-installer
          path: build/windows/x64/runner/Release/*.msix
      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path portable -Force | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
                           -DestinationPath portable/mhjzb-windows-portable.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: mhjzb-windows-portable
          path: portable/mhjzb-windows-portable.zip
